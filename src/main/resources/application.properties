# ===========================
# Application
# ===========================
spring.application.name=fraud-detection
server.port=8080

# ===========================
# PostgreSQL Database
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/frauddb
spring.datasource.username=frauduser
spring.datasource.password=fraudpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Flyway (DB Migrations)
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===========================
# Redis
# ===========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ===========================
# Kafka
# ===========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=fraud-detection-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# ===========================
# Kafka Topics
# ===========================
kafka.topic.transactions=transactions.raw
kafka.topic.alerts=fraud.alerts

# ===========================
# JWT
# ===========================
jwt.secret=3f8a2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
jwt.expiration=86400000

# ===========================
# Actuator
# ===========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===========================
# Swagger
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true